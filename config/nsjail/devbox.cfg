name: "devbox"
description: "Jail for development"
mode: ONCE
hostname: "devbox"
cwd: "/home/cell"

keep_env: true
envar: "DROP_ENV=devbox"
envar: "HOME=/home/cell"
envar: "TMP=/tmp"
mount_proc: true
user_net { }

mount {
    src: "/nix/store"
    dst: "/nix/store"
    is_bind: true
    rw: false
}

mount {
    src: "/nix/var/nix"
    dst: "/nix/var/nix"
    is_bind: true
    rw: true
}

mount {
    src: "/run/user/1000/docker.sock"
    dst: "/run/user/1000/docker.sock"
    is_bind: true
    rw: false
}

mount {
    src: "/run/user/1000/wayland-0"
    dst: "/run/user/1000/wayland-0"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/nsjail/devbox"
    dst: "/home/cell"
    is_bind: true
    rw: true
}

mount {
    prefix_src_env: "HOME"
    src: "/.config/atuin"
    prefix_dst_env: "HOME"
    dst: "/.config/atuin"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/.config/direnv"
    prefix_dst_env: "HOME"
    dst: "/.config/direnv"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/.config/docker/daemon.json"
    prefix_dst_env: "HOME"
    dst: "/.config/docker/daemon.json"
    is_bind: true
    rw: false
}


mount {
    prefix_src_env: "HOME"
    src: "/.config/nvim"
    prefix_dst_env: "HOME"
    dst: "/.config/nvim"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/.local/share/nvim"
    prefix_dst_env: "HOME"
    dst: "/.local/share/nvim"
    is_bind: true
    rw: true
}

mount {
    prefix_src_env: "HOME"
    src: "/.nix-profile"
    prefix_dst_env: "HOME"
    dst: "/.nix-profile"
    is_bind: true
    rw: false
}


mount {
    prefix_src_env: "HOME"
    src: "/.p10k.zsh"
    prefix_dst_env: "HOME"
    dst: "/.p10k.zsh"
    is_bind: true
    rw: false
}


mount {
    prefix_src_env: "HOME"
    src: "/.zshenv"
    prefix_dst_env: "HOME"
    dst: "/.zshenv"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/.zprofile"
    prefix_dst_env: "HOME"
    dst: "/.zprofile"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/.zshrc"
    prefix_dst_env: "HOME"
    dst: "/.zshrc"
    is_bind: true
    rw: false
}

mount {
    prefix_src_env: "HOME"
    src: "/tmp"
    prefix_dst_env: "HOME"
    dst: "/tmp"
    is_bind: true
    rw: true
}


uidmap {
	inside_id: "1000"
}

gidmap {
	inside_id: "1000"
}

mount {
	src_content: "nameserver 8.8.8.8\n"
	dst: "/etc/resolv.conf"
}

mount {
	dst: "/proc"
	fstype: "proc"
	rw: true
}

mount {
	src: "/lib"
	dst: "/lib"
	is_bind: true
}

mount {
	src: "/usr"
	dst: "/usr"
	is_bind: true
}

mount {
	src: "/lib64"
	dst: "/lib64"
	is_bind: true
	mandatory: false
}

mount {
	dst: "/tmp"
	fstype: "tmpfs"
	rw: true
	is_bind: false
	noexec: true
	nodev: true
	nosuid: true
}

mount {
	src: "/dev/null"
	dst: "/dev/null"
	rw: true
	is_bind: true
}

mount {
	dst: "/dev/shm"
	fstype: "tmpfs"
	rw: true
	is_bind: false
}

exec_bin {
	path: "/home/cell/.nix-profile/bin/zsh"
}
